server {
    listen 80;
    server_name 20.162.106.26;

    root /opt/chatsense/app/frontend/dist;
    index index.html;

    location /static/ {
        alias /opt/chatsense/app/staticfiles/;
        access_log off;
        expires 7d;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8004/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:8004/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location / {
        try_files $uri /index.html;
    }
}
